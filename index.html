<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>JW.ABM | 株式会社 不讲故事，只解决实际问题。</title>
    <meta name="description" content="不讲故事，只解决实际问题。用真实经历，讨论现实选择与长期结构。">
    <meta name="keywords" content="出国咨询, 跨境贸易, 电商运营, 网站建设, JW.ABM | 墨金">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --ink-gold: linear-gradient(135deg, #d4af37 0%, #fcf6ba 45%, #d4af37 100%);
            --static-gold: #d4af37;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background-color: #000; 
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; 
            font-weight: 300;
            color: var(--static-gold); 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased;
            letter-spacing: 0.15em;
        }

        /* 1. 音乐控制 - 极致透明且不遮字 */
        .music-control {
            position: fixed; top: 25px; left: 20px; z-index: 1000;
            width: 36px; height: 36px; 
            border: 0.5px solid rgba(212,175,55,0.2); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; background: rgba(0,0,0,0.1); transition: all 0.5s ease;
            backdrop-filter: blur(2px);
        }
        
        .music-icon { 
            font-size: 13px; 
            color: var(--static-gold); 
            opacity: 0.3; /* 平时极淡，不干扰视线 */
            transition: opacity 0.5s ease;
            display: inline-block;
        }

        /* 旋转动画定义 */
        @keyframes rotate { 
            from { transform: rotate(0deg); } 
            to { transform: rotate(360deg); } 
        }

        /* 播放状态：图标变亮并旋转 */
        .rotating { 
            animation: rotate 5s linear infinite !important; 
            opacity: 0.8 !important; 
        }

        /* 右上角导航 */
        .floating-nav {
            position: fixed; top: 30px; right: 25px; z-index: 1000;
            display: flex; flex-direction: column; gap: 20px; text-align: right;
        }
        .nav-link { text-decoration: none !important; transition: all 0.3s ease; }
        .main-text { font-size: 13px; color: var(--static-gold); letter-spacing: 3px; display: block; }
        .sub-text { font-size: 8px; color: rgba(212,175,55,0.5); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; display: block; }

        /* 图片展示区 */
        .gallery { width: 100%; background: #000; }
        .gallery img { width: 100%; display: block; outline: none; border: none; }

        /* 中间文字区域 */
        .transition-section {
            padding: 160px 20px; text-align: center; background: #000;
            display: flex; flex-direction: column; justify-content: center; min-height: 60vh;
        }
        .transition-section p { 
            color: var(--static-gold); 
            font-size: 15px; line-height: 2.8; letter-spacing: 5px; 
            opacity: 0.9;
            margin-bottom: 5px;
        }
        
        .gold-ink {
            margin: 30px auto 0; 
            font-size: 21px; 
            font-weight: 400; 
            letter-spacing: 7px;
            background: var(--ink-gold);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 2px 15px rgba(212, 175, 55, 0.2);
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.3s ease;
        }
        .gold-ink:active { transform: scale(0.95); }

        /* 底部背景区域修复 */
        .fixed-bg-section {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            background-color: #000;
        }

        .fixed-bg-section::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('img5.jpg');
            background-position: center center;
            background-repeat: no-repeat;
            background-size: cover;
            z-index: 0;
        }

        .fixed-bg-section::after {
            content: "";
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 80%;
            background: linear-gradient(to top, #000 30%, rgba(0,0,0,0.6) 60%, transparent 100%);
            z-index: 1;
        }

        .footer-overlay { 
            position: relative; 
            z-index: 10; 
            padding-bottom: calc(60px + env(safe-area-inset-bottom)); 
            text-align: center; 
            width: 100%; 
        }
        
        .contact-links { margin-bottom: 35px; display: flex; justify-content: center; flex-wrap: wrap; gap: 25px; }
        .contact-links a { 
            color: var(--static-gold); 
            text-decoration: none; font-size: 13px; border-bottom: 0.5px solid rgba(212,175,55,0.4);
            padding-bottom: 5px; display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        
        .qr-group { display: flex; justify-content: center; gap: 30px; margin-bottom: 30px; }
        .qr-item img { 
            width: 110px; height: 110px; 
            border: 0.5px solid rgba(212,175,55,0.3); 
            border-radius: 4px; background: #fff; padding: 5px; 
        }
        .qr-item span { display: block; margin-top: 15px; font-size: 11px; color: var(--static-gold); letter-spacing: 2px; opacity: 0.7; }
        
        .copyright { color: rgba(212,175,55,0.3); font-size: 9px; margin-top: 40px; letter-spacing: 4px; }

        @media (max-width: 480px) {
            .transition-section { padding: 100px 20px; }
            .gold-ink { font-size: 18px; }
            .qr-item img { width: 105px; height: 105px; }
        }
    </style>
</head>
<body>

    <!-- 音乐 -->
    <div id="music-btn" class="music-control">
        <audio id="bg-audio" src="bgm.mp3" loop preload="auto"></audio>
        <span class="music-icon"><i class="fa-solid fa-compact-disc"></i></span>
    </div>

    <!-- 导航 -->
    <nav class="floating-nav">
        <a href="https://abm-ry.pages.dev" target="_blank" class="nav-link">
            <span class="main-text">JW.ABM | 日本語</span>
            <span class="sub-text">Language Service</span>
        </a>
        <a href="https://abm-mj.pages.dev/" target="_blank" class="nav-link">
            <span class="main-text">JW.ABM | 墨金</span>
            <span class="sub-text">Global Business</span>
        </a>
    </nav>

    <!-- 内容 -->
    <div class="gallery">
        <img src="img1.jpg" alt="情绪开篇" loading="eager">
        <img src="img2.jpg" alt="真实观察" loading="lazy">
        <img src="img3.jpg" alt="现实逻辑" loading="lazy">
        <img src="img4.jpg" alt="决策价值" loading="lazy">
    </div>

    

    <div class="fixed-bg-section">
        <div class="footer-overlay">
            <div class="contact-links">
                <a href="tel:08093084568"><i class="fa-solid fa-phone"></i> 电话联络</a>
                <a href="https://line.me/ti/p/szmkPgsXTu/"><i class="fa-brands fa-line"></i> LINE 咨询</a>
                <a href="mailto:jw.abm777@gmail.com"><i class="fa-solid fa-envelope"></i> Email</a>
            </div>

            <div class="qr-group">
                <div class="qr-item">
                    <img src="qr-wechat.png" alt="微信联系">
                    <span>微信联系</span>
                </div>
                <div class="qr-item">
                    <img src="qr-line.png" alt="LINE 账号">
                    <span>LINE 账号</span>
                </div>
            </div>
            <p class="copyright">不讲故事 · 只解决实际问题</p>
        </div>
    </div>

    <script>
        const btn = document.getElementById('music-btn');
        const audio = document.getElementById('bg-audio');
        const icon = document.querySelector('.music-icon');
        let isPlaying = false;

        btn.onclick = function() {
            if (!isPlaying) { 
                audio.play().then(() => {
                    icon.classList.add('rotating'); 
                    isPlaying = true;
                }).catch(e => {
                    console.log("Play blocked");
                    // 部分手机首次需引导点击
                }); 
            } else { 
                audio.pause(); 
                icon.classList.remove('rotating'); 
                isPlaying = false;
            }
        };

        function copyWechat() {
            const wechatId = "l08093084568";
            const handleCopy = () => alert("微信号已复制。备注“看完了”，我会知道你是谁。");

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(wechatId).then(handleCopy);
            } else {
                const input = document.createElement('input');
                input.value = wechatId;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                handleCopy();
            }
        }
    </script>
</body>
</html>
